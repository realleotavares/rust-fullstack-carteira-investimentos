<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-950 flex justify-center items-center min-h-screen" style="font-family: 'Space Mono', monospace;">
    <div class="w-full max-w-sm bg-white/5 backdrop-blur-xl border border-white/10 rounded-2xl p-8 shadow-[0_0_30px_rgba(34,211,238,0.1)]">
        <form method="POST" action="/login" class="flex flex-col gap-5">
            <input
                type="text"
                name="username"
                placeholder="username"
                required
                autocomplete="username"
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:outline-none focus:border-cyan-400/50 focus:shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all duration-300"
            >
            <input
                type="password"
                name="password"
                placeholder="password"
                required
                autocomplete="current-password"
                class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-white/30 focus:outline-none focus:border-cyan-400/50 focus:shadow-[0_0_15px_rgba(34,211,238,0.2)] transition-all duration-300"
            >
            <button type="submit" class="px-4 py-3 bg-cyan-500/20 border border-cyan-400/30 rounded-xl text-cyan-400 font-medium hover:bg-cyan-500/30 hover:shadow-[0_0_20px_rgba(34,211,238,0.3)] active:bg-cyan-500/40 transition-all duration-300">submit</button>
        </form>
    </div>
</body>
</html>
